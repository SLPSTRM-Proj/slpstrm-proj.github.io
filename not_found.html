<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Project SlipStream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/iconify-icon@2.1.0/dist/iconify-icon.min.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body class="bg-[#09090b] text-zinc-400 antialiased selection:bg-cyan-900 selection:text-cyan-50 relative min-h-screen flex flex-col" style="font-family: 'Inter', system-ui, sans-serif;">
    
    <!-- Subtle Top Gradient -->
    <div class="absolute top-0 inset-x-0 h-96 bg-gradient-to-b from-cyan-900/10 to-transparent pointer-events-none z-0"></div>

    <!-- Navigation -->
    <nav class="absolute top-0 w-full z-50 border-b border-white/[0.05] bg-transparent">
        <div class="max-w-6xl mx-auto px-6 h-14 flex items-center justify-between">
            <a href="/" class="text-zinc-100 font-medium tracking-tighter text-sm uppercase flex items-center gap-2 hover:text-white transition-colors duration-300">
                <iconify-icon icon="solar:waterdrops-linear" width="16" height="16" style="stroke-width: 1.5;" class="text-cyan-500"></iconify-icon>
                SLIPSTREAM
            </a>
            <a href="/" class="text-xs font-medium text-zinc-400 hover:text-zinc-100 transition-colors duration-300">
                Back to Home
            </a>
        </div>
    </nav>

    <main class="flex-1 relative z-10 flex flex-col items-center justify-center px-6 overflow-hidden min-h-screen">
        <!-- Background Grid & Glow -->
        <div class="absolute inset-0 bg-[linear-gradient(to_right,#80808012_1px,transparent_1px),linear-gradient(to_bottom,#80808012_1px,transparent_1px)] bg-[size:24px_24px] [mask-image:radial-gradient(ellipse_60%_50%_at_50%_50%,#000_70%,transparent_100%)] pointer-events-none"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[60vw] h-[60vh] bg-cyan-600/5 blur-[150px] rounded-full pointer-events-none"></div>
        
        <div class="max-w-2xl mx-auto text-center relative z-10 flex flex-col items-center">
            <!-- Alert Badge -->
            <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-white/[0.03] border border-white/[0.08] text-xs font-medium text-cyan-400 mb-8 backdrop-blur-sm">
                <iconify-icon icon="solar:radar-linear" width="14" height="14" style="stroke-width: 1.5;"></iconify-icon>
                Signal Lost
            </div>
            
            <!-- Large 404 -->
            <h1 class="text-8xl md:text-9xl font-medium text-zinc-50 tracking-tighter leading-none mb-6 drop-shadow-2xl">
                404
            </h1>
            
            <!-- Context -->
            <h2 class="text-2xl md:text-3xl font-medium text-zinc-300 tracking-tight mb-4">
                Drifted off course.
            </h2>
            
            <p class="text-base md:text-lg text-zinc-500 max-w-md mx-auto mb-10 font-light leading-relaxed">
                The coordinates you entered led to empty waters. The page you're looking for doesn't exist or has been moved.
            </p>
            
            <!-- Action -->
            <a href="/" class="px-6 py-2.5 rounded-lg bg-zinc-100 text-zinc-950 text-sm font-medium hover:bg-white transition-all duration-300 flex items-center justify-center gap-2 shadow-[0_0_20px_rgba(255,255,255,0.1)]">
                <iconify-icon icon="solar:arrow-left-linear" width="16" height="16" style="stroke-width: 1.5;"></iconify-icon>
                Return to Surface
            </a>
        </div>
    </main>

    <!-- Footer -->
    <footer class="absolute bottom-0 w-full border-t border-white/[0.05] bg-transparent py-8 z-10">
        <div class="max-w-6xl mx-auto px-6 flex flex-col sm:flex-row items-center justify-center sm:justify-between gap-4">
            <div class="font-medium tracking-tighter uppercase text-xs text-zinc-600 flex items-center gap-1.5">
                <iconify-icon icon="solar:waterdrops-linear" width="12" height="12" style="stroke-width: 1.5;"></iconify-icon>
                SLPSTRM
            </div>
            <div class="text-xs text-zinc-600 font-light text-center">
                &copy; 2024 Project SlipStream. Built for the water.
            </div>
        </div>
    </footer>

</body>
</html>
